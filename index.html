<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Connected Clone</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#222428">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.cdnfonts.com/css/nexa-bold" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/nexa-light" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #222428; 
            --shadow-dark: #1a1b1e;
            --shadow-light: #2a2d32;
            --accent: #ff5454; 
            --accent-shadow: rgba(255, 84, 84, 0.4);
            --text-main: #ffffff; 
            --text-muted: #8b929e; 
            --text-red: #ff5454;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg-color); color: var(--text-main); font-family: 'Nexa', 'Nexa Bold', 'Nexa Light', sans-serif; }
        body { display: flex; justify-content: center; }
        input, textarea, button { font-family: inherit; }
        
        .app-container { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; position: relative; overflow: hidden; padding-top: env(safe-area-inset-top); background: var(--bg-color); }
        .hidden { display: none !important; }
        
        .outset { background: var(--bg-color); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }
        .inset { background: var(--bg-color); box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); }
        .outset-red { background: var(--accent); box-shadow: 4px 4px 10px var(--accent-shadow), -2px -2px 8px rgba(255,255,255,0.1); }
        
        @keyframes slideUpFade { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .toast { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); background: var(--bg-color); color: var(--accent); padding: 14px 26px; border-radius: 30px; font-weight: 600; font-size: 15px; z-index: 9999; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 6px 6px 15px var(--shadow-dark), -6px -6px 15px var(--shadow-light); white-space: nowrap; }
        .toast.show { transform: translate(-50%, calc(env(safe-area-inset-top, 20px) + 15px)); }
        
        /* LOGIN / SIGNUP */
        .login-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px; z-index: 200; position: absolute; width: 100%; height: 100%; background: var(--bg-color); }
        
        .rolling-wrapper { overflow: hidden; width: 100%; position: relative; }
        .rolling-slider { display: flex; flex-direction: column; height: 200%; transition: transform 0.7s cubic-bezier(0.85, 0, 0.15, 1); width: 100%; }
        .rolling-slider.show-second { transform: translateY(-50%); }
        .rolling-slider > * { height: 50%; width: 100%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin: 0; padding: 0; }
        
        #title-slider { transition-delay: 0s; }
        #subtitle-slider { transition-delay: 0.05s; }
        #btn-slider { transition-delay: 0.1s; }
        #toggle-slider { transition-delay: 0.15s; }
        
        .login-screen h1 { color: var(--text-main); font-size: 34px; font-weight: 800; }
        .login-screen p.subtitle { color: var(--text-muted); font-size: 16px; }
        
        .input-group { animation: slideUpFade 0.6s ease-out 0.2s both; }
        input, textarea { width: 100%; padding: 18px 24px; border-radius: 20px; border: none; background: var(--bg-color); color: white; font-size: 16px; margin-bottom: 20px; outline: none; transition: all 0.3s; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); }
        input:focus, textarea:focus { box-shadow: inset 7px 7px 14px var(--shadow-dark), inset -7px -7px 14px var(--shadow-light); }
        
        button.btn-primary { width: 100%; color: #fff; border: none; border-radius: 20px; font-size: 17px; font-weight: 700; cursor: pointer; transition: transform 0.2s; background: var(--accent); box-shadow: 6px 6px 15px var(--accent-shadow), -4px -4px 10px var(--shadow-light); }
        button.btn-primary:active { transform: scale(0.96); box-shadow: 2px 2px 8px var(--accent-shadow); }
        
        .toggle-auth { text-align: center; color: var(--text-muted); margin-top: 25px; font-size: 15px; font-weight: 600; cursor: pointer; user-select: none; margin-left: auto; margin-right: auto; }
        
        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; flex-shrink: 0; background: var(--bg-color); z-index: 50; }
        .top-bar-left { display: flex; align-items: center; gap: 15px; }
        .top-bar h2 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
        
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-color); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; color: var(--text-muted); flex-shrink: 0; box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }
        
        .icon-btn { background: var(--bg-color); border: none; color: var(--text-muted); display: flex; justify-content: center; align-items: center; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light); transition: all 0.2s; }
        .icon-btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); color: var(--accent); }
        .icon-btn.red { background: var(--accent); color: white; box-shadow: 4px 4px 10px var(--accent-shadow), -2px -2px 6px var(--shadow-light); }
        .icon-btn.red:active { transform: scale(0.95); box-shadow: 2px 2px 5px var(--accent-shadow); }

        .content-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 10px; }
        
        .search-container { padding: 5px 25px 20px 25px; }
        .search-container input { margin: 0; padding: 15px 20px; border-radius: 25px; font-size: 15px; color: var(--text-muted); }
        .search-container input::placeholder { color: #5a5f6b; }
        
        .list-item { display: flex; align-items: center; padding: 15px 25px; cursor: pointer; transition: all 0.2s; position: relative; }
        .list-item::after { content: ''; position: absolute; bottom: 0; left: 90px; right: 25px; height: 1px; background: var(--shadow-dark); box-shadow: 0 1px 0 var(--shadow-light); }
        .list-item:active { background: rgba(0,0,0,0.1); }
        
        .list-info { flex: 1; overflow: hidden; margin-left: 18px; }
        .list-info strong { display: block; font-size: 16px; margin-bottom: 6px; font-weight: 700; color: var(--text-main); }
        .list-info span { color: var(--text-muted); font-size: 14px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .meta-container { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; margin-left: 10px; min-width: 50px; }
        .meta-time { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .meta-time.unread { color: var(--text-red); }
        .unread-dot { background: var(--accent); color: white; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 10px; box-shadow: 2px 2px 6px var(--accent-shadow); }

        .bottom-nav { display: flex; background: var(--bg-color); margin: 0 20px 20px 20px; border-radius: 35px; box-shadow: 6px 6px 15px var(--shadow-dark), -6px -6px 15px var(--shadow-light); flex-shrink: 0; padding: 10px 15px; position: relative; z-index: 150; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; transition: all 0.3s; width: 55px; height: 55px; border-radius: 20px; }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; transition: all 0.3s; }
        .nav-item.active { background: var(--bg-color); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); color: var(--accent); }
        
        /* OVERLAY (CHAT & PROFILE) - MODIFICAT Z-INDEX LA 250 */
        .overlay-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-color); z-index: 250; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .overlay-screen.show { transform: translateX(0); }
        
        .chat-box { flex: 1; overflow-y: auto; padding: 20px 25px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg-container { display: flex; flex-direction: column; max-width: 80%; animation: slideUpFade 0.3s ease-out; }
        .msg-container.me { align-self: flex-end; align-items: flex-end; }
        .msg-container.them { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 14px 20px; border-radius: 20px; font-size: 15px; width: fit-content; line-height: 1.4; }
        .msg-them { background: var(--bg-color); color: var(--text-main); box-shadow: 5px 5px 12px var(--shadow-dark), -5px -5px 12px var(--shadow-light); border-top-left-radius: 5px; }
        .msg-me { background: var(--accent); color: #fff; box-shadow: 4px 4px 12px var(--accent-shadow), -2px -2px 8px rgba(255,255,255,0.05); border-bottom-right-radius: 5px; }
        
        .msg-status { font-size: 11px; color: var(--text-muted); margin-top: 8px; display: flex; gap: 5px; align-items: center; padding: 0 4px; font-weight: 600; }
        .msg-container.me .msg-status { color: #5a5f6b; }

        .chat-input-area { display: flex; padding: 10px 20px 20px 20px; background: var(--bg-color); flex-shrink: 0; align-items: center; gap: 12px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        .chat-input-area input { flex: 1; border-radius: 30px; padding: 16px 20px; background: var(--bg-color); box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); border: none; margin-bottom: 0; font-size: 15px; }
        .chat-input-area button { background: var(--accent); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 5px 5px 12px var(--accent-shadow), -3px -3px 8px var(--shadow-light); transition: transform 0.2s; }
        .chat-input-area button:active { transform: scale(0.9); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }
        .chat-input-area button svg { width: 20px; height: 20px; fill: white; margin-left: 3px; }

        .file-upload-btn { background: var(--bg-color); border-radius: 50%; width: 140px; height: 140px; margin: 20px auto 30px auto; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--text-muted); cursor: pointer; overflow: hidden; font-size: 14px; padding: 10px; box-shadow: 6px 6px 15px var(--shadow-dark), -6px -6px 15px var(--shadow-light); }
        .big-avatar { width: 130px; height: 130px; border-radius: 50%; background: var(--bg-color); background-position: center; background-size: cover; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--text-muted); overflow: hidden; box-shadow: 6px 6px 15px var(--shadow-dark), -6px -6px 15px var(--shadow-light); border: 4px solid var(--bg-color); }
        .profile-card-header { height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .stories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 25px; }
        .story-card { background: var(--bg-color); border-radius: 20px; overflow: hidden; height: 220px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; box-shadow: 5px 5px 15px var(--shadow-dark), -5px -5px 15px var(--shadow-light); cursor: pointer; border: 2px solid var(--bg-color); }
        .story-bg { position: absolute; top:0; left:0; width:100%; height:100%; background-size: cover; background-position: center; z-index: 1; }
        .story-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 60%); z-index: 2; }
        .story-meta { z-index: 3; position: relative; display: flex; align-items: center; gap: 8px; }
        .story-meta .mini-avatar { width: 28px; height: 28px; border-radius: 50%; background-size: cover; background-color: var(--bg-color); box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .story-meta span { font-size: 13px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.8); color: white; }
        
        .story-views-pill { position: absolute; top: 10px; right: 10px; background: var(--accent); padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; color: white; display: flex; align-items: center; gap: 4px; z-index: 4; box-shadow: 2px 2px 6px var(--accent-shadow); }
        .story-views-pill svg { width: 12px; height: 12px; stroke: white; }

        .story-viewer { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 500; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .story-progress-bar { height: 3px; background: rgba(255,255,255,0.2); margin: 10px 20px; border-radius: 2px; overflow: hidden; }
        .story-progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 4s linear; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="toast" class="toast"></div>

        <div id="view-login" class="login-screen">
            <div class="rolling-wrapper" style="height: 42px; margin-bottom: 8px;">
                <div class="rolling-slider" id="title-slider">
                    <h1>Log In</h1>
                    <h1>Sign Up</h1>
                </div>
            </div>
            
            <div class="rolling-wrapper" style="height: 20px; margin-bottom: 40px;">
                <div class="rolling-slider" id="subtitle-slider">
                    <p class="subtitle">Welcome back</p>
                    <p class="subtitle">Create a new account</p>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="login-user" placeholder="Username" />
                <input type="password" id="login-pin" pattern="[0-9]*" inputmode="numeric" maxlength="4" placeholder="4-digit PIN" />
            </div>

            <button class="btn-primary" onclick="authenticate()" style="padding:0; height:60px; overflow:hidden;">
                <div class="rolling-slider" id="btn-slider">
                    <span>Sign In</span>
                    <span>Sign Up</span>
                </div>
            </button>
            
            <div class="rolling-wrapper toggle-auth" onclick="toggleAuthMode()" style="height: 20px;">
                <div class="rolling-slider" id="toggle-slider">
                    <span>No account? Sign up</span>
                    <span>Already have an account? Log in</span>
                </div>
            </div>
        </div>

        <div id="view-main" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            
            <div id="tab-inbox" class="content-area">
                <div class="top-bar">
                    <div class="top-bar-left">
                        <div id="main-my-avatar" class="avatar" onclick="switchTab('myprofile')"></div>
                        <h2>Chats</h2>
                    </div>
                    <button class="icon-btn red" onclick="switchTab('search')">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
                <div class="search-container"><input type="text" placeholder="Search..." onclick="switchTab('search')"/></div>
                <ul id="inbox-list" style="margin: 0; padding: 0; list-style: none;"></ul>
            </div>
            
            <div id="tab-search" class="content-area hidden">
                <div class="top-bar">
                    <div class="top-bar-left"><h2>Discover</h2></div>
                </div>
                <div class="search-container"><input type="text" id="search-input" placeholder="Search users..." oninput="socket.emit('search-users', this.value)" /></div>
                <ul id="search-list" style="margin: 0; padding: 0; list-style: none;"></ul>
            </div>

            <div id="tab-stories" class="content-area hidden">
                <div class="top-bar">
                    <div class="top-bar-left"><h2>Stories</h2></div>
                    <label for="story-file-input" class="icon-btn red" style="margin:0; cursor:pointer;">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </label>
                    <input type="file" id="story-file-input" accept="image/*" style="display: none;" onchange="handleStoryUpload(this)" />
                </div>
                <div id="stories-feed-container" class="stories-grid"></div>
            </div>
            
            <div id="tab-myprofile" class="content-area hidden">
                <div class="top-bar">
                    <div class="top-bar-left"><h2>Profile</h2></div>
                    <button class="icon-btn" onclick="logout()"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></button>
                </div>
                <div style="padding: 20px;">
                    <label for="gallery-input" class="file-upload-btn" id="upload-status-label">🖼️ Select Photo</label>
                    <input type="file" id="gallery-input" accept="image/*" style="display: none;" onchange="handleFileSelect(this)" />
                    <textarea id="my-bio-input" rows="3" placeholder="Bio..."></textarea>
                    <button class="btn-primary" onclick="saveProfile()" style="margin-top: 10px;">Save Profile</button>
                </div>
            </div>
            
            <div class="bottom-nav">
                <div id="nav-inbox" class="nav-item active" onclick="switchTab('inbox')">
                    <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                </div>
                <div id="nav-search" class="nav-item" onclick="switchTab('search')">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <div id="nav-stories" class="nav-item" onclick="switchTab('stories')">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                </div>
                <div id="nav-myprofile" class="nav-item" onclick="switchTab('myprofile')">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </div>
            </div>
        </div>

        <div id="view-chat" class="overlay-screen">
            <div class="top-bar">
                <button class="icon-btn" onclick="closeChat()">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div style="display: flex; align-items: center; gap: 15px; margin-right: auto; margin-left: 15px;">
                    <div id="chat-header-avatar" class="avatar" style="width: 44px; height: 44px; margin: 0; box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);"></div>
                    <div>
                        <h2 id="chat-title" style="margin: 0; font-size: 16px;">Name</h2>
                        <span style="font-size: 12px; color: var(--text-muted);">Online</span>
                    </div>
                </div>
                <button class="icon-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </button>
            </div>
            <div id="chat-messages" class="chat-box"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." />
                <button onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>

        <div id="view-public-profile" class="overlay-screen">
            <div class="top-bar" style="background:transparent; border:none; position:absolute; width:100%; z-index:100; box-shadow:none;">
                <button class="icon-btn" onclick="closePublicProfile()">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
            </div>
            <div class="content-area" style="padding-top: 60px;">
                <div class="profile-card-header"><div id="public-profile-avatar" class="big-avatar"></div><div id="public-profile-username" class="profile-name" style="font-size:22px; font-weight:800;"></div></div>
                <div style="padding: 0 25px;"><div id="public-profile-bio" class="inset" style="padding:20px; border-radius:20px; color:var(--text-muted); font-size:15px; text-align: center;"></div></div>
                
                <h3 style="padding: 25px 25px 5px 25px; font-size: 16px; font-weight: 700; color: var(--text-main);">Active Stories</h3>
                <div id="public-profile-stories" class="stories-grid"></div>
                
                <div style="padding:25px;"><button class="btn-primary" id="start-anon-chat-btn">Anonymous Message</button></div>
            </div>
        </div>

        <div id="view-story-viewer" class="hidden story-viewer">
            <div class="story-progress-bar"><div id="story-progress-fill" class="story-progress-fill"></div></div>
            <div class="top-bar" style="background:transparent; border:none; box-shadow:none;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div id="viewer-avatar" class="avatar" style="width:36px; height:36px; margin:0; box-shadow:none; border:2px solid var(--accent);"></div>
                    <strong id="viewer-username" style="color:white; font-size:15px; text-shadow:0 2px 4px rgba(0,0,0,0.8);">User</strong>
                </div>
                <button class="icon-btn" onclick="closeStoryViewer()" style="background:rgba(0,0,0,0.4); box-shadow:none; color:white;">✕</button>
            </div>
            <div id="viewer-media-container" style="flex:1; background-size:contain; background-position:center; background-repeat:no-repeat; margin-bottom:30px;"></div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }
        const socket = io();
        let myAnonId = "", myUsername = "", currentChatMode = "", currentChatPartner = "", myInboxCache = {}, base64AvatarString = "";
        let isLoginMode = true;
        let storyTimeout = null;

        function formatTime(sqlTimestamp) {
            if (!sqlTimestamp) return '';
            const d = new Date(sqlTimestamp + 'Z');
            const now = new Date();
            const diff = (now - d) / 1000; 
            if (diff < 60) return 'now';
            if (diff < 3600) return Math.floor(diff/60) + 'm';
            if (diff < 86400 && now.getDate() === d.getDate()) return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
            return d.getDate() + '/' + (d.getMonth()+1);
        }

        function showToast(msg, isSuccess = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('cc_user');
            const savedPin = localStorage.getItem('cc_pin');
            if (savedUser && savedPin) {
                socket.emit('auth-request', { username: savedUser, pin: savedPin, isLogin: true });
            }
        };

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            
            const titleSlider = document.getElementById('title-slider');
            const subtitleSlider = document.getElementById('subtitle-slider');
            const btnSlider = document.getElementById('btn-slider');
            const toggleSlider = document.getElementById('toggle-slider');

            if (!isLoginMode) {
                titleSlider.classList.add('show-second');
                subtitleSlider.classList.add('show-second');
                btnSlider.classList.add('show-second');
                toggleSlider.classList.add('show-second');
            } else {
                titleSlider.classList.remove('show-second');
                subtitleSlider.classList.remove('show-second');
                btnSlider.classList.remove('show-second');
                toggleSlider.classList.remove('show-second');
            }
        }

        function authenticate() {
            const user = document.getElementById('login-user').value.trim();
            const pin = document.getElementById('login-pin').value.trim();
            if(!user || !pin) { showToast("Please fill in both fields!"); return; }
            socket.emit('auth-request', { username: user.toLowerCase(), pin: pin, isLogin: isLoginMode });
        }
        
        socket.on('auth-error', (msg) => { showToast(msg); });

        socket.on('auth-success', (data) => {
            if(!isLoginMode) showToast("Account created successfully!", true);
            myUsername = data.username;
            localStorage.setItem('cc_user', data.username);
            localStorage.setItem('cc_pin', data.pin);
            socket.emit('register-user', { username: data.username, pin: data.pin });
        });

        function logout() { localStorage.removeItem('cc_user'); localStorage.removeItem('cc_pin'); window.location.reload(); }
        
        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) { 
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 256; 
                        let size = Math.min(img.width, img.height); canvas.width = MAX_SIZE; canvas.height = MAX_SIZE;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, MAX_SIZE, MAX_SIZE);
                        base64AvatarString = canvas.toDataURL('image/jpeg', 0.8);
                        const lbl = document.getElementById('upload-status-label');
                        lbl.style.backgroundImage = `url(${base64AvatarString})`; lbl.style.backgroundSize = "cover"; lbl.textContent = "";
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function handleStoryUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = 480; canvas.height = 800;
                        const ctx = canvas.getContext('2d');
                        let srcX = 0, srcY = 0, srcW = img.width, srcH = img.height;
                        const targetRatio = 480 / 800; const currentRatio = img.width / img.height;
                        if(currentRatio > targetRatio) { srcW = img.height * targetRatio; srcX = (img.width - srcW) / 2; }
                        else { srcH = img.width / targetRatio; srcY = (img.height - srcH) / 2; }
                        ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, 480, 800);
                        const base64Story = canvas.toDataURL('image/jpeg', 0.75);
                        socket.emit('upload-story', { username: myUsername, media: base64Story });
                        showToast("Story uploaded successfully!", true);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
        
        socket.on('unified-inbox-data', (data) => {
            myInboxCache = data.chats; myAnonId = data.accountAnonId;
            document.getElementById('my-bio-input').value = data.profile.bio || '';
            base64AvatarString = data.profile.avatar || '';
            
            const myAv = document.getElementById('main-my-avatar');
            const lbl = document.getElementById('upload-status-label');
            if (base64AvatarString) { 
                lbl.style.backgroundImage = `url(${base64AvatarString})`; lbl.style.backgroundSize = "cover"; lbl.textContent = ""; 
                myAv.style.backgroundImage = `url(${base64AvatarString})`; myAv.textContent = "";
            } else {
                myAv.textContent = myUsername.charAt(0).toUpperCase();
            }

            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
            renderInboxList();
        });
        
        function saveProfile() { socket.emit('update-profile', { username: myUsername, bio: document.getElementById('my-bio-input').value, avatar: base64AvatarString }); showToast('Profile saved!', true); }
        
        function renderInboxList() {
            const ul = document.getElementById('inbox-list'); ul.innerHTML = '';
            Object.keys(myInboxCache).sort((a,b) => new Date(myInboxCache[b].messages.slice(-1)[0].timestamp) - new Date(myInboxCache[a].messages.slice(-1)[0].timestamp)).forEach(chatId => {
                const chat = myInboxCache[chatId]; const lastMsg = chat.messages.slice(-1)[0];
                const isUnread = (chat.type === 'received' && lastMsg.sender !== myUsername && !lastMsg.seen);
                let avatarHtml = `<div class="avatar">${chat.type==='received'?'A':chat.partnerId.charAt(0).toUpperCase()}</div>`;
                if (chat.type === 'sent' && chat.partnerAvatar) avatarHtml = `<div class="avatar" style="background-image: url(${chat.partnerAvatar}); color: transparent;"></div>`;
                const timeStr = formatTime(lastMsg.timestamp);
                
                let unreadHtml = isUnread ? `<div class="unread-dot">New</div>` : '';
                
                let displayName = chat.type === 'received' ? 'Anonymous (' + chat.partnerId.split('_')[1].substring(0,4).toUpperCase() + ')' : chat.partnerId;

                ul.innerHTML += `<li class="list-item" onclick="openChat('${chat.type}', '${chat.partnerId}')">
                    ${avatarHtml}
                    <div class="list-info">
                        <strong>${displayName}</strong>
                        <span style="${isUnread ? 'color: var(--text-main); font-weight: 500;' : ''}">${lastMsg.text}</span>
                    </div>
                    <div class="meta-container">
                        <div class="meta-time ${isUnread ? 'unread' : ''}">${timeStr}</div>
                        ${unreadHtml}
                    </div>
                </li>`;
            });
        }
        
        function openChat(type, partner) {
            currentChatMode = type; currentChatPartner = partner; const chatId = type + '_' + partner; const chat = myInboxCache[chatId];
            document.getElementById('chat-title').textContent = type === 'received' ? 'Anonymous' : partner;
            const headerAvatar = document.getElementById('chat-header-avatar');
            if (type === 'sent' && chat && chat.partnerAvatar) { headerAvatar.style.backgroundImage = `url(${chat.partnerAvatar})`; headerAvatar.textContent = ''; } 
            else { headerAvatar.style.backgroundImage = 'none'; headerAvatar.textContent = type === 'received' ? 'A' : partner.charAt(0).toUpperCase(); }
            document.getElementById('view-chat').classList.add('show');
            const msgs = chat ? chat.messages : []; const box = document.getElementById('chat-messages'); box.innerHTML = '';
            msgs.forEach(msg => appendMessageUI(msg, false));
            socket.emit('mark-seen', { myUsername, partnerId: partner, mode: type });
            setTimeout(() => box.scrollTop = box.scrollHeight, 50);
        }
        
        function closeChat() { document.getElementById('view-chat').classList.remove('show'); renderInboxList(); }
        function sendMessage() {
            const text = document.getElementById('chat-input').value.trim(); if(!text) return;
            const isReply = (currentChatMode === 'received'); const nowIso = new Date().toISOString().replace('T', ' ').substring(0, 19);
            appendMessageUI({ sender: isReply ? myUsername : 'anon', text: text, seen: 0, timestamp: nowIso }, true);
            socket.emit(isReply ? 'send-user-reply' : 'send-anon-message', { myUsername, toUser: currentChatPartner, toAnonId: currentChatPartner, text });
            document.getElementById('chat-input').value = '';
        }
        function appendMessageUI(msg, scroll) {
            const box = document.getElementById('chat-messages');
            const isMe = (currentChatMode === 'received' && msg.sender === myUsername) || (currentChatMode === 'sent' && msg.sender === 'anon');
            const timeStr = formatTime(msg.timestamp);
            box.innerHTML += `<div class="msg-container ${isMe?'me':'them'}">
                <div class="msg ${isMe?'msg-me':'msg-them'}">${msg.text}</div>
                <div class="msg-status">${timeStr} ${isMe ? `<span>${msg.seen ? '✓✓' : '✓'}</span>` : ''}</div>
            </div>`;
            if(scroll) box.scrollTop = box.scrollHeight;
        }
        
        function switchTab(tab) {
            ['inbox','search','stories','myprofile'].forEach(t => {
                document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
                document.getElementById('nav-'+t).classList.toggle('active', t === tab);
            });
            if(tab === 'search') socket.emit('search-users', '');
            if(tab === 'stories') socket.emit('get-stories'); 
        }
        
        socket.on('all-stories-data', (list) => {
            const feed = document.getElementById('stories-feed-container'); feed.innerHTML = '';
            list.forEach(s => {
                feed.innerHTML += `<div class="story-card" onclick="viewFullStory('${s.id}', '${s.username}', '${s.media}', '${s.avatar || ''}')">
                    <div class="story-views-pill"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> ${s.views || 0}</div>
                    <div class="story-bg" style="background-image: url(${s.media})"></div>
                    <div class="story-overlay"></div>
                    <div class="story-meta">
                        <div class="mini-avatar" style="background-image: url(${s.avatar || ''})"></div>
                        <span>${s.username}</span>
                    </div>
                </div>`;
            });
        });

        function viewFullStory(id, user, media, avatar) {
            socket.emit('view-story', { storyId: id, username: myUsername });
            document.getElementById('viewer-username').textContent = user;
            document.getElementById('viewer-media-container').style.backgroundImage = `url(${media})`;
            const av = document.getElementById('viewer-avatar');
            if(avatar) { av.style.backgroundImage = `url(${avatar})`; av.textContent = ''; }
            else { av.style.backgroundImage = 'none'; av.textContent = user.charAt(0).toUpperCase(); }
            
            const viewer = document.getElementById('view-story-viewer');
            viewer.classList.remove('hidden'); viewer.style.display = 'flex';
            
            const fill = document.getElementById('story-progress-fill');
            fill.style.width = '0%';
            setTimeout(() => fill.style.width = '100%', 10);
            
            if(storyTimeout) clearTimeout(storyTimeout);
            storyTimeout = setTimeout(() => closeStoryViewer(), 4000);
        }
        
        function closeStoryViewer() {
            if(storyTimeout) clearTimeout(storyTimeout);
            const viewer = document.getElementById('view-story-viewer');
            viewer.classList.add('hidden'); viewer.style.display = 'none';
        }
        
        socket.on('search-results', (list) => {
            const ul = document.getElementById('search-list'); ul.innerHTML = '';
            list.forEach(u => {
                let avatarHtml = `<div class="avatar">${u.username.charAt(0).toUpperCase()}</div>`;
                if (u.avatar) avatarHtml = `<div class="avatar" style="background-image: url(${u.avatar}); color: transparent;"></div>`;
                ul.innerHTML += `<li class="list-item" onclick="socket.emit('get-public-profile', '${u.username}')">${avatarHtml}<div class="list-info"><strong>${u.username}</strong><span>${u.bio || 'No bio added...'}</span></div></li>`;
            });
        });
        
        socket.on('public-profile-data', (data) => {
            const u = data.user;
            document.getElementById('public-profile-username').textContent = u.username;
            document.getElementById('public-profile-bio').textContent = u.bio || 'No bio added.';
            const avatarDiv = document.getElementById('public-profile-avatar');
            if(u.avatar) { avatarDiv.style.backgroundImage = `url(${u.avatar})`; avatarDiv.textContent = ""; }
            else { avatarDiv.style.backgroundImage = "none"; avatarDiv.textContent = u.username.charAt(0).toUpperCase(); }

            const pGrid = document.getElementById('public-profile-stories'); pGrid.innerHTML = '';
            if(data.stories.length === 0) {
                pGrid.innerHTML = `<p style="grid-column: span 2; color:var(--text-muted); font-size:14px; padding:10px 0; text-align:center;">No active stories at the moment.</p>`;
            } else {
                data.stories.forEach(s => {
                    pGrid.innerHTML += `<div class="story-card" style="height:140px" onclick="viewFullStory('${s.id}', '${u.username}', '${s.media}', '${u.avatar || ''}')">
                        <div class="story-views-pill"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> ${s.views || 0}</div>
                        <div class="story-bg" style="background-image: url(${s.media})"></div>
                        <div class="story-overlay"></div>
                    </div>`;
                });
            }

            document.getElementById('view-public-profile').classList.add('show');
            document.getElementById('start-anon-chat-btn').onclick = () => { closePublicProfile(); openChat('sent', u.username); };
        });
        function closePublicProfile() { document.getElementById('view-public-profile').classList.remove('show'); }
    </script>
</body>
</html>
